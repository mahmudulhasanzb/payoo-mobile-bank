<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payoo Practice</title>
  <!-- TailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
  <div class="logo w-[200px] mx-auto pt-10"><img src="./assets/Logo-full.png" alt=""></div>

  <div class="form pt-10 ">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-sm mx-auto">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-sm font-bold">Mobile Number</label>
          <input id="input-number" type="number" class="input" maxlength="11" minlength="11" required placeholder="017xxxxxxxx" />

          <br>

          <label class="label text-sm font-bold">Password</label>
          <input id="input-pin" type="password" class="input" placeholder="1234" maxlength="4" minlength="4" required />
          <div class="flex justify-start"><a class="link link-hover text-primary">Forgot password?</a></div>
          <button id="login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>
    </div>
  </div>

  <!-- Or demo credential -->
    <div class="divider text-[#1F2937]">
      <span>OR</span>
    </div>
        
    <div class="demo-credentials w-full text-center text-[#1F2937]">
      <p class="mb-2">Demo Credentials:</p>
      <div class="bg-gray-100 p-6 rounded-md">
        <p><strong>Username:</strong> admin</p>
        <p><strong>Password:</strong> admin123</p>
      </div>
    </div> 
  
  <script src="./script/login.js"></script>
</body>
</html>
